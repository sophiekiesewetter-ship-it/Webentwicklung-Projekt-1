<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Date Ideen </title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>

<body>

<header>
  <h1>💖 Date Ideen</h1>
</header>

<section class="form-section">
  <input type="text" id="title" placeholder="Eigene Idee...">
  <textarea id="description" placeholder="Beschreibung... (max. 300 Zeichen)" maxlength="300"></textarea>
  <div class="textarea-box">
     <div class="char-count">0 / 300 Zeichen</div>
  </div>

  <div class="bewertung">
    <h2>Wie bewertet ihr das Date?</h2>
    <div class="sterne">
      <input type="radio" id="stern5" name="bewertung" value="5">
      <label for="stern5" title="5 Sterne">★</label>
      <input type="radio" id="stern4" name="bewertung" value="4">
      <label for="stern4" title="4 Sterne">★</label>
      <input type="radio" id="stern3" name="bewertung" value="3">
      <label for="stern3" title="3 Sterne">★</label>
      <input type="radio" id="stern2" name="bewertung" value="2">
      <label for="stern2" title="2 Sterne">★</label>
      <input type="radio" id="stern1" name="bewertung" value="1">
      <label for="stern1" title="1 Stern">★</label>
    </div>
  </div>

  <button id="myButton" type="button">Hinzufügen</button>

  <!-- Bild Upload -->
  <label class="upload">
      📷 Bild 
      <input type="file" accept="image/*">
  </label>
</section>


<section class="inspiration">
  <h2>✨ Inspiration</h2>
  <!-- Inspiration-Cards werden per DOM Manipulation aus script.js eingefügt -->
  <div class="inspirationsbox" id="inspirationsbox"></div>
</section>

<section class="ideas">
    <div class="ideasbox">
  <h2>📌 Deine Ideen</h2>
  <!-- ToDo Liste -->
    <div class="todo-list">

        <div id="ideaList"></div>
    </div>
  </div>
</section>


</body>
</html>
