<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Date Ideen App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>💡 Date Ideen</h1>

<!-- Eingabe Bereich -->
<div class="form">
    <input type="text" placeholder="Neue Date Idee...">
    <input type="text" placeholder="Bild URL">
    <button>Hinzufügen</button>
</div>

<!-- Ideen -->
<h2>📌 Ideen</h2>

<div class="idea">
    <h3>Picknick im Park 🌳</h3>
    <div class="stars">
        ★★★★☆
    </div>
    <img src="https://via.placeholder.com/200" alt="Bild">
    <div class="buttons">
        <button>Zu To-Do</button>
        <button>Löschen</button>
    </div>
</div>

<div class="idea">
    <h3>Kinoabend 🍿</h3>
    <div class="stars">
        ★★★★★
    </div>
    <img src="https://via.placeholder.com/200" alt="Bild">
    <div class="buttons">
        <button>Zu To-Do</button>
        <button>Löschen</button>
    </div>
</div>

<!-- Vorschläge -->
<h2>⭐ Vorschläge</h2>
<ul class="suggestions">
    <li>Städtetrip ✈️</li>
    <li>Kochen zusammen 🍝</li>
    <li>Bowling 🎳</li>
</ul>

<!-- To-Do Liste -->
<h2>📝 To-Do Liste</h2>
<ul class="todo">
    <li>
        Restaurant besuchen 🍽️
        <div class="buttons">
            <button>Bearbeiten</button>
            <button>❌</button>
        </div>
    </li>

    <li>
        Spaziergang am See 🌅
        <div class="buttons">
            <button>Bearbeiten</button>
            <button>❌</button>
        </div>
    </li>
</ul>

</body>
</html>
